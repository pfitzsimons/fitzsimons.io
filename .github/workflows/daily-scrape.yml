name: Daily Race Scraper & Deploy

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python3 scripts/scrape_races.py --out "$GITHUB_WORKSPACE/horses"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horses/races.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "🏇 Race data $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
