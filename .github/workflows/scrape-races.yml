name: Scrape Races

on:
  schedule:
    # Once daily at 08:00 UTC (09:00 BST / 08:00 GMT)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date override YYYY-MM-DD (leave blank for today)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: TEMP probe candidate sources
        run: python3 scripts/probe_sources.py

      - name: Scrape today's races
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          DATE_ARG=""
          if [ -n "$DATE_OVERRIDE" ]; then
            DATE_ARG="--date $DATE_OVERRIDE"
          fi
          python3 scripts/scrape_races.py $DATE_ARG --out "$GITHUB_WORKSPACE/horses"

      - name: Verify output
        run: |
          if [ ! -f horses/races.json ]; then
            echo "ERROR: horses/races.json not found"
            exit 1
          fi
          RACE_COUNT=$(python3 -c "import json; d=json.load(open('horses/races.json')); print(len(d.get('races',[])))")
          echo "Scraped $RACE_COUNT races"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horses/races.json
          if git diff --staged --quiet; then
            echo "No changes to races.json"
          else
            git commit -m "🏇 Races $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]"
            git push
          fi
