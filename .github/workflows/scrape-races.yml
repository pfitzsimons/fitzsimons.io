name: Scrape Races

on:
  schedule:
    # Every 20 minutes across UK/IRE racing hours (07:07–20:47 UTC). The first
    # run of the day writes the frozen start-of-day accuracy record; every later
    # run refreshes the live races.json (odds, non-runners, going) without
    # touching that record. Results/accuracy stay on their own daily schedule.
    #
    # Offset off the top of the hour (:07/:27/:47 rather than :00/:20/:40):
    # GitHub's scheduled-workflow queue is best-effort and deprioritised under
    # load, worst at :00. This is a stopgap that reduces — but does not
    # eliminate — dropped/delayed runs; see community discussion 156282. The
    # durable fix is an external scheduler firing workflow_dispatch.
    - cron: '7,27,47 7-20 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date override YYYY-MM-DD (leave blank for today)'
        required: false
        default: ''

# Never let two scrapes run at once — a queued run waits for the in-flight one
# to finish committing, so intraday merges can't race each other.
concurrency:
  group: scrape-races
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape today's races
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          DATE_ARG=""
          if [ -n "$DATE_OVERRIDE" ]; then
            DATE_ARG="--date $DATE_OVERRIDE"
          fi
          python3 scripts/scrape_races.py $DATE_ARG --out "$GITHUB_WORKSPACE/horses"

      - name: Verify output
        run: |
          if [ ! -f horses/races.json ]; then
            echo "ERROR: horses/races.json not found"
            exit 1
          fi
          RACE_COUNT=$(python3 -c "import json; d=json.load(open('horses/races.json')); print(len(d.get('races',[])))")
          echo "Scraped $RACE_COUNT races"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Live file plus the start-of-day archive the first run writes.
          git add horses/races.json horses/history/ || true
          if git diff --staged --quiet; then
            echo "No content changes — nothing to commit"
          else
            git commit -m "🏇 Races $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]"
            # A concurrent run may have pushed between our checkout and now;
            # rebase on the latest before pushing so we never clobber it.
            git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
            git push
          fi
