name: Scrape Races

on:
  schedule:
    # Every 15 mins, 09:00–20:45 UTC
    # Covers 10:00am–9:45pm BST (summer) / 9:00am–8:45pm GMT (winter)
    - cron: '*/15 9-20 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Date override YYYY-MM-DD (leave blank for today)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape today's races
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: |
          DATE_ARG=""
          if [ -n "$DATE_OVERRIDE" ]; then
            DATE_ARG="--date $DATE_OVERRIDE"
          fi
          python3 scripts/scrape_races.py $DATE_ARG --out "$GITHUB_WORKSPACE/horses"

      - name: Verify output
        run: |
          if [ ! -f horses/races.json ]; then
            echo "ERROR: horses/races.json not found"
            exit 1
          fi
          RACE_COUNT=$(python3 -c "import json; d=json.load(open('horses/races.json')); print(len(d.get('races',[])))")
          echo "Scraped $RACE_COUNT races"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horses/races.json
          if git diff --staged --quiet; then
            echo "No changes to races.json"
          else
            git commit -m "🏇 Races $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]"
            git push
          fi
